<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Rescue the Lion 语音闯关</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#fff;text-align:center;padding:20px;}
        .wrap{max-width:1000px;margin:0 auto;}
        h1{color:#8B4513;margin:10px 0 20px;}
        .level{font-size:18px;color:#666;margin-bottom:10px;}
        .hint{background:#fff3cd;border:2px dashed #ffc107;padding:15px 20px;border-radius:12px;margin-bottom:20px;}
        .words{font-size:24px;font-weight:bold;color:#000;}
        .scene{position:relative;width:700px;height:450px;margin:0 auto;}
        .net{width:100%;height:100%;position:absolute;top:0;left:0;transition:all 1s ease;pointer-events:none;}
        .net.break{opacity:0;transform:scale(1.3);}
        .lion{width:100%;height:100%;position:absolute;top:0;left:0;display:none;pointer-events:none;}
        .btn{padding:12px 25px;font-size:18px;margin:10px;border:none;border-radius:8px;background:#28a745;color:white;cursor:pointer;}
        .btn.pass{background:#ffc107;color:#222;}
        .btn.next{background:#007bff;display:none;}
        .btn.reset{background:#dc3545;}
        .result{font-size:22px;margin:15px 0;min-height:30px;}
        .success{color:#28a745;font-weight:bold;}
    </style>
</head>
<body>
<div class="wrap">
    <h1>Rescue the Lion 语音闯关</h1>
    <div class="level">关卡：<span id="lv">1</span>/5</div>

    <div class="hint">
        <h3>捕兽网关键词</h3>
        <div class="words" id="kw">Once / caught / mouse</div>
    </div>

    <div class="scene">
        <img id="net" class="net" src="img/net1.png" alt="Net">
        <img id="lion" class="lion" src="img/lion1.png" alt="Lion">
    </div>

    <button class="btn" id="speak" type="button">开始朗读</button>
    <button class="btn pass" id="pass" type="button">直接成功</button>
    <button class="btn next" id="next" type="button">下一关</button>
    <button class="btn reset" type="button" onclick="window.location.reload()">重置游戏</button>
    <div class="result" id="res"></div>
</div>

<script>
const levels = [
{
    words:"Once / caught / mouse",
    target:"once the lion caught the mouse",
    net:"img/net1.png",
    lion:"img/lion1.png"
},
{
    words:"mouse / promised to / help",
    target:"the mouse promised to help the lion",
    net:"img/net2.png",
    lion:"img/lion2.png"
},
{
    words:"Then / laughed / let go",
    target:"then the lion laughed and let the mouse go",
    net:"img/net3.png",
    lion:"img/lion3.png"
},
{
    words:"Later / hunter / caught",
    target:"later the hunter caught the lion",
    net:"img/net4.png",
    lion:"img/lion4.png"
},
{
    words:"In the end / bit through / set free",
    target:"in the end the mouse bit through the net and set the lion free",
    net:"img/net5.png",
    lion:"img/lion5.png"
}
];

let cur = 0;
let levelPassed = false;
const kw = document.getElementById("kw");
const net = document.getElementById("net");
const lion = document.getElementById("lion");
const res = document.getElementById("res");
const lv = document.getElementById("lv");
const speak = document.getElementById("speak");
const pass = document.getElementById("pass");
const next = document.getElementById("next");

function load(){
    levelPassed = false;
    kw.textContent = levels[cur].words;
    net.src = levels[cur].net;
    lion.src = levels[cur].lion;
    net.classList.remove("break");
    lion.style.display = "none";
    res.textContent = "";
    pass.textContent = "直接成功";
    pass.style.display = "inline-block";
    pass.disabled = false;
    next.style.display = "none";
    lv.textContent = cur + 1;
}

function passLevel(){
    if(levelPassed){
        return;
    }

    levelPassed = true;
    res.innerHTML = '<span class="success">正确！狮子获救了！</span>';
    net.classList.add("break");
    lion.style.display = "block";

    if(cur < levels.length - 1){
        pass.style.display = "none";
        next.style.display = "inline-block";
    }else{
        pass.style.display = "none";
        res.innerHTML += "<br>全部通关！";
    }
}

function goNext(){
    if(cur >= levels.length - 1){
        return;
    }

    cur++;
    load();
}

load();

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
    speak.disabled = true;
    res.textContent = "当前浏览器不支持语音识别，请使用 Chrome 或 Edge。";
}else{
    const rec = new SpeechRecognition();
    rec.lang = "en-US";
    rec.interimResults = false;

    speak.addEventListener("click", () => {
        res.textContent = "聆听中，请朗读...";
        rec.start();
    });

    rec.addEventListener("result", e => {
        const s = e.results[0][0].transcript.toLowerCase();
        res.textContent = "你说：" + s;

        if(s.includes(levels[cur].target)){
            passLevel();
        }else{
            res.textContent += " 请重读。";
        }
    });
}

pass.addEventListener("click", passLevel);

next.addEventListener("click", goNext);
</script>
</body>
</html>
